project:
  name: "llm_200m_mid_training_superbpe"
  seed: 42
  output_dir: "outputs/llm_200m_mid_training_superbpe"
  docs_dir: "docs"

dataset:
  target_train_tokens: 550000000 # ~550M tokens for mid-training
  validation_ratio: 0.05
  streaming_package_tokens: 8388608 # 32 optimizer steps with the default 2-GPU batch
  stream_shuffle_buffer_size: 10000
  source_mixture_window_size: 1024
  validate_sources_on_start: true
  cache_dir: "./data/cache"
  processed_dir: "outputs/llm_200m_mid_training_superbpe/processed"
  tokenize_num_workers: 16
  sources:
    - name: "smoltalk2_smol_magpie_ultra"
      id: "HuggingFaceTB/smoltalk2"
      config_name: "SFT"
      split: "smoltalk_smollm3_smol_magpie_ultra_no_think"
      target_tokens: 245000000
      format: "chat"
    - name: "smoltalk2_openhermes_2_5"
      id: "HuggingFaceTB/smoltalk2"
      config_name: "SFT"
      split: "OpenHermes_2.5_no_think"
      target_tokens: 95000000
      format: "chat"
    - name: "smoltalk2_mixture_of_thoughts_science"
      id: "HuggingFaceTB/smoltalk2"
      config_name: "SFT"
      split: "Mixture_of_Thoughts_science_no_think"
      target_tokens: 30000000
      format: "chat"
      sample_range: [0.0, 0.8]
      sample_range_key: "smoltalk2-mixture-science-no-think"
    - name: "smoltalk2_smol_summarize"
      id: "HuggingFaceTB/smoltalk2"
      config_name: "SFT"
      split: "smoltalk_smollm3_smol_summarize_no_think"
      target_tokens: 45000000
      format: "chat"
    - name: "smoltalk1_smol_magpie_ultra"
      id: "HuggingFaceTB/smoltalk"
      config_name: "smol-magpie-ultra"
      split: "train"
      target_tokens: 75000000
      format: "chat"
    - name: "smoltalk1_openhermes_100k"
      id: "HuggingFaceTB/smoltalk"
      config_name: "openhermes-100k"
      split: "train"
      target_tokens: 45000000
      format: "chat"
    - name: "gsm8k_train_a"
      id: "openai/gsm8k"
      config_name: "main"
      split: "train"
      target_tokens: 15000000
      format: "gsm8k"
      sample_range: [0.0, 0.5162]
      sample_range_key: "gsm8k-train"

tokenizer:
  type: "superbpe"
  vocab_size: 50000
  special_tokens:
    pad_token: "<pad>"
    bos_token: "<bos>"
    eos_token: "<eos>"
    unk_token: "<unk>"
  save_dir: "pre-train/artifacts/tokenizer_superbpe_50k_olmo_p99"
  append_eos: true
  allow_unverified_superbpe_backend: true
  do_not_fallback_to_standard_bpe_silently: true

model:
  architecture: "decoder_only_transformer"
  positional_encoding: "rope"
  attention: "gqa"
  flash_attention: true
  flash_attention_fallback: true
  activation: "swiglu"
  normalization: "rmsnorm"
  vocab_size: 50000
  max_seq_len: 2048
  n_layers: 12
  d_model: 1024
  num_attention_heads: 16
  num_key_value_heads: 4
  ffn_multiplier: 3.125
  multiple_of: 64
  norm_eps: 1.0e-5
  rope_theta: 10000.0
  dropout: 0.0
  tie_embeddings: true

training:
  distributed:
    enabled: true
    backend: "nccl"
    strategy: "ddp"
    num_gpus: 2

  precision: "bf16"
  compile_model: false

  micro_batch_size: 4
  gradient_accumulation_steps: 16
  max_steps: null
  max_tokens: 550000000

  optimizer:
    name: "adamw"
    learning_rate: 2.5e-4
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.1

  scheduler:
    name: "cosine"
    warmup_steps: 500
    min_lr: 3.5e-5

  checkpointing:
    resume_from: "last_pre_trains/sbpe_latest.pt"
    save_dir: "outputs/llm_200m_mid_training_superbpe/checkpoints"
    save_every_steps: 500
    keep_last_n: 3

evaluation:
  eval_every_steps: 250
  eval_steps: 50

logging:
  log_every_steps: 10

plots:
  enabled: true
  output_dir: "outputs/llm_200m_mid_training_superbpe/plots"
  keep_existing_plots: true
