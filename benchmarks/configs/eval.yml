project:
  name: "llm_200m_evaluation"

tokenizer:
  type: "superbpe"
  vocab_size: 50000
  special_tokens:
    pad_token: "<pad>"
    bos_token: "<bos>"
    eos_token: "<eos>"
    unk_token: "<unk>"
  save_dir: "pre-train/artifacts/tokenizer_superbpe_50k_olmo_p99"
  append_eos: true
  allow_unverified_superbpe_backend: true
  do_not_fallback_to_standard_bpe_silently: true

evaluation:
  ppl_dataset: "HuggingFaceFW/fineweb-edu"
  benchmarks:
    - perplexity
    - hellaswag
    - arc_easy
    - piqa
    - winogrande
    - gsm8k
  batch_size: 16
  limit: 20  # Limit samples evaluated per dataset during standard run (to keep evaluation fast)
