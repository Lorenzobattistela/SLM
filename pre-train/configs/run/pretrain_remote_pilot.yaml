name: pretrain_remote_pilot
model_config: pre-train/configs/model/slm_70m.yaml
data_config: pre-train/configs/data/fineweb_edu_pilot.yaml
train:
  output_dir: runs/pretrain_remote_pilot
  seed: 1337
  device: auto
  ddp: false
  batch_size: 12
  eval_batch_size: 12
  grad_accum_steps: 4
  max_steps: 1000
  log_interval: 10
  eval_interval: 100
  eval_batches: 40
  save_interval: 100
  lr: 3.0e-4
  min_lr: 3.0e-5
  warmup_steps: 50
  weight_decay: 0.1
  betas: [0.9, 0.95]
  grad_clip: 1.0
  precision: bf16
  compile: false
  resume_from: null
  sample_prompt: "Machine learning is changing the world because"
  sample_every_eval: true
  sample_temperature: 0.8
  sample_top_k: 40
  sample_max_new_tokens: 80
