project:
  name: "llm_200m_fineweb_edu_debug"
  seed: 42
  output_dir: "outputs/llm_200m_fineweb_edu_debug"
  docs_dir: "docs"

dataset:
  name: "HuggingFaceFW/fineweb-edu"
  split: "train"
  text_column: "text"
  streaming: true
  target_train_tokens: 10000
  validation_tokens: 4096
  validation_salt: "slm-pretrain-debug-v1"
  cache_dir: "data/cache"
  raw_dir: "data/raw"
  processed_dir: "data/processed_debug"
  tokenize_num_workers: 2
  filters:
    language: "en"
    language_score_min: 0.95
    score_min: 3.8
    token_count_min: 200
    token_count_max: 4096
  selection:
    target_custom_tokens: 10000
    shuffle: true
    prioritize_quality: true
    quality_buffer_size: 10000

tokenizer:
  type: "superbpe"
  vocab_size: 1000
  min_frequency: 1
  special_tokens:
    pad_token: "<pad>"
    bos_token: "<bos>"
    eos_token: "<eos>"
    unk_token: "<unk>"
  save_dir: "artifacts/tokenizer_debug"
  train_samples: 100
  corpus_chunk_samples: 100
  corpus_num_workers: 2
  append_eos: true
  superbpe_stage1_vocab_size: 800
  superbpe_num_inherit_merges: 800
  allow_unverified_superbpe_backend: false
  do_not_fallback_to_standard_bpe_silently: true

model:
  architecture: "decoder_only_transformer"
  target_parameters: 101000000
  acceptable_min_parameters: 95000000
  acceptable_max_parameters: 105000000

  positional_encoding: "rope"
  attention: "mqa"
  use_flash_attention: true
  flash_attention_fallback: true

  activation: "swiglu"
  normalization: "rmsnorm"

  vocab_size: 1000
  max_seq_len: 2048
  n_layers: 12
  d_model: 768
  n_heads: 12
  num_kv_heads: 1
  ffn_multiplier: 4
  multiple_of: 256
  norm_eps: 1.0e-5
  rope_theta: 10000.0
  dropout: 0.0
  tie_embeddings: true

training:
  distributed:
    enabled: true
    backend: "nccl"
    strategy: "ddp"
    num_gpus: 2

  precision: "bf16"
  compile_model: false

  micro_batch_size: 8
  gradient_accumulation_steps: 16
  max_steps: null
  max_tokens: 10000

  optimizer:
    name: "adamw"
    learning_rate: 3.0e-4
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.1

  scheduler:
    name: "cosine"
    warmup_steps: 2000
    min_lr: 3.0e-5

  gradient_clipping:
    enabled: true
    max_norm: 1.0

  checkpointing:
    save_dir: "checkpoints/llm_200m_fineweb_edu_debug"
    save_every_steps: 1000
    keep_last_n: 5
    resume_from: null

evaluation:
  enabled: true
  eval_every_steps: 500
  eval_steps: 100
  metrics:
    - "loss"
    - "perplexity"

logging:
  log_every_steps: 10
  use_tensorboard: true
  tensorboard_dir: "outputs/llm_200m_fineweb_edu_debug/tensorboard"
  use_wandb: false
  wandb_project: "llm_200m_fineweb_edu_debug"

plots:
  enabled: true
  output_dir: "outputs/llm_200m_fineweb_edu_debug/plots"
  keep_existing_plots: true
  generate:
    - "train_loss"
    - "validation_loss"
    - "perplexity"
    - "learning_rate"
    - "tokens_seen"
    - "gradient_norm"
