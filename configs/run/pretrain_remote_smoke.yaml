name: pretrain_remote_smoke
model_config: configs/model/slm_70m.yaml
data_config: configs/data/fineweb_edu_debug.yaml
train:
  output_dir: runs/pretrain_remote_smoke
  seed: 1337
  device: auto
  ddp: false
  batch_size: 8
  eval_batch_size: 8
  grad_accum_steps: 4
  max_steps: 100
  log_interval: 5
  eval_interval: 25
  eval_batches: 20
  save_interval: 50
  lr: 3.0e-4
  min_lr: 3.0e-5
  warmup_steps: 10
  weight_decay: 0.1
  betas: [0.9, 0.95]
  grad_clip: 1.0
  precision: bf16
  compile: false
  resume_from: null
  sample_prompt: "Deep learning systems become useful when"
  sample_every_eval: true
  sample_temperature: 0.8
  sample_top_k: 40
  sample_max_new_tokens: 80
