name: pretrain_remote_full_2gpu
model_config: configs/model/slm_70m.yaml
data_config: configs/data/fineweb_edu_full.yaml
train:
  output_dir: runs/pretrain_remote_full_2gpu
  seed: 1337
  device: auto
  ddp: true
  batch_size: 12
  eval_batch_size: 12
  grad_accum_steps: 4
  max_steps: 12000
  log_interval: 10
  eval_interval: 200
  eval_batches: 80
  save_interval: 200
  lr: 3.0e-4
  min_lr: 3.0e-5
  warmup_steps: 200
  weight_decay: 0.1
  betas: [0.9, 0.95]
  grad_clip: 1.0
  precision: bf16
  compile: false
  resume_from: null
  sample_prompt: "Scientific progress depends on"
  sample_every_eval: true
  sample_temperature: 0.8
  sample_top_k: 40
  sample_max_new_tokens: 80
