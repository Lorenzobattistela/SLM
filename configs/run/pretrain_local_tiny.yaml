name: pretrain_local_tiny
model_config: configs/model/tiny.yaml
data_config: configs/data/fineweb_edu_tiny.yaml
train:
  output_dir: runs/pretrain_local_tiny
  seed: 1337
  device: auto
  ddp: false
  batch_size: 8
  eval_batch_size: 8
  grad_accum_steps: 1
  max_steps: 200
  log_interval: 10
  eval_interval: 50
  eval_batches: 16
  save_interval: 100
  lr: 3.0e-4
  min_lr: 3.0e-5
  warmup_steps: 20
  weight_decay: 0.1
  betas: [0.9, 0.95]
  grad_clip: 1.0
  precision: fp32
  compile: false
  resume_from: null
  sample_prompt: "The purpose of a language model is"
  sample_every_eval: true
  sample_temperature: 0.8
  sample_top_k: 40
  sample_max_new_tokens: 80
