project:
  name: "llm_200m_sft"
  seed: 42
  output_dir: "outputs/llm_200m_sft"
  docs_dir: "docs"

dataset:
  sft_dataset: "HuggingFaceTB/smoltalk"
  target_train_tokens: 150000000
  validation_ratio: 0.05
  cache_dir: "./data/cache"
  processed_dir: "outputs/llm_200m_sft/processed"
  tokenize_num_workers: 4

tokenizer:
  type: "superbpe"
  vocab_size: 50000
  special_tokens:
    pad_token: "<pad>"
    bos_token: "<bos>"
    eos_token: "<eos>"
    unk_token: "<unk>"
  save_dir: "artifacts/tokenizer_superbpe_50k_olmo_p99"
  append_eos: true
  allow_unverified_superbpe_backend: true
  do_not_fallback_to_standard_bpe_silently: true

model:
  architecture: "decoder_only_transformer"
  positional_encoding: "rope"
  attention: "gqa"
  flash_attention: true
  flash_attention_fallback: true
  activation: "swiglu"
  normalization: "rmsnorm"
  vocab_size: 50000
  max_seq_len: 2048
  n_layers: 12
  d_model: 1024
  num_attention_heads: 16
  num_key_value_heads: 4
  ffn_multiplier: 3.125
  multiple_of: 64
  norm_eps: 1.0e-5
  rope_theta: 10000.0
  dropout: 0.0
  tie_embeddings: true

training:
  distributed:
    enabled: true
    backend: "nccl"
    strategy: "ddp"
    num_gpus: 2

  precision: "bf16"
  compile_model: false

  micro_batch_size: 4
  gradient_accumulation_steps: 16
  max_steps: null
  max_tokens: 150000000

  optimizer:
    name: "adamw"
    learning_rate: 2.0e-5
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.1

  scheduler:
    name: "cosine"
    warmup_steps: 500
    min_lr: 2.0e-6

  gradient_clipping:
    enabled: true
    max_norm: 1.0

  checkpointing:
    resume_from: "outputs/llm_200m_mid_training/checkpoints/latest.pt"
    save_dir: "outputs/llm_200m_sft/checkpoints"
    save_every_steps: 500
    keep_last_n: 3

evaluation:
  eval_every_steps: 250
  eval_steps: 50

logging:
  log_every_steps: 10

plots:
  enabled: true
  output_dir: "outputs/llm_200m_sft/plots"
  keep_existing_plots: true
