project:
  name: "llm_200m_sft_superbpe_debug"
  seed: 42
  output_dir: "outputs/llm_200m_sft_superbpe_debug"
  docs_dir: "docs"

dataset:
  target_train_tokens: 50000
  validation_ratio: 0.05
  streaming_package_tokens: 8192
  stream_shuffle_buffer_size: 128
  source_mixture_window_size: 128
  validate_sources_on_start: true
  cache_dir: "./data/cache"
  processed_dir: "outputs/llm_200m_sft_superbpe_debug/processed"
  tokenize_num_workers: 2
  sources:
    - name: "smoltalk2_systemchats_30k"
      id: "HuggingFaceTB/smoltalk2"
      config_name: "SFT"
      split: "smoltalk_smollm3_systemchats_30k_no_think"
      target_tokens: 4000
      format: "chat"
    - name: "smoltalk2_tulu_personas_if"
      id: "HuggingFaceTB/smoltalk2"
      config_name: "SFT"
      split: "tulu_3_sft_personas_instruction_following_no_think"
      target_tokens: 6915
      format: "chat"
    - name: "smoltalk2_smol_rewrite"
      id: "HuggingFaceTB/smoltalk2"
      config_name: "SFT"
      split: "smoltalk_smollm3_smol_rewrite_no_think"
      target_tokens: 10170
      format: "chat"
    - name: "smoltalk2_explore_instruct_rewriting"
      id: "HuggingFaceTB/smoltalk2"
      config_name: "SFT"
      split: "smoltalk_smollm3_explore_instruct_rewriting_no_think"
      target_tokens: 2315
      format: "chat"
    - name: "smoltalk2_everyday_conversations"
      id: "HuggingFaceTB/smoltalk2"
      config_name: "SFT"
      split: "smoltalk_smollm3_everyday_conversations_no_think"
      target_tokens: 315
      format: "chat"
    - name: "smoltalk2_multilingual_8languages_lang_5"
      id: "HuggingFaceTB/smoltalk2"
      config_name: "SFT"
      split: "smoltalk_multilingual_8languages_lang_5_no_think"
      target_tokens: 6250
      format: "chat"
    - name: "smoltalk2_mixture_of_thoughts_science_holdout"
      id: "HuggingFaceTB/smoltalk2"
      config_name: "SFT"
      split: "Mixture_of_Thoughts_science_no_think"
      target_tokens: 3750
      format: "chat"
      sample_range: [0.8, 1.0]
      sample_range_key: "smoltalk2-mixture-science-no-think"
    - name: "smoltalk1_smol_constraints"
      id: "HuggingFaceTB/smoltalk"
      config_name: "smol-constraints"
      split: "train"
      target_tokens: 5000
      format: "chat"
    - name: "smoltalk1_smol_rewrite"
      id: "HuggingFaceTB/smoltalk"
      config_name: "smol-rewrite"
      split: "train"
      target_tokens: 4255
      format: "chat"
    - name: "gsm8k_train_b"
      id: "openai/gsm8k"
      config_name: "main"
      split: "train"
      target_tokens: 7030
      format: "gsm8k"
      sample_range: [0.5162, 1.0]
      sample_range_key: "gsm8k-train"

tokenizer:
  type: "superbpe"
  vocab_size: 50000
  special_tokens:
    pad_token: "<pad>"
    bos_token: "<bos>"
    eos_token: "<eos>"
    unk_token: "<unk>"
  save_dir: "pre-train/artifacts/tokenizer_superbpe_50k_olmo_p99"
  append_eos: true
  allow_unverified_superbpe_backend: true
  do_not_fallback_to_standard_bpe_silently: true

model:
  architecture: "decoder_only_transformer"
  positional_encoding: "rope"
  attention: "gqa"
  flash_attention: false
  flash_attention_fallback: true
  activation: "swiglu"
  normalization: "rmsnorm"
  vocab_size: 50000
  max_seq_len: 2048
  n_layers: 2
  d_model: 256
  num_attention_heads: 4
  num_key_value_heads: 2
  ffn_multiplier: 2.0
  multiple_of: 32
  norm_eps: 1.0e-5
  rope_theta: 10000.0
  dropout: 0.0
  tie_embeddings: true

training:
  distributed:
    enabled: false
    backend: "gloo"
    strategy: "ddp"
    num_gpus: 0

  precision: "fp32"
  compile_model: false

  micro_batch_size: 2
  gradient_accumulation_steps: 2
  max_steps: null
  max_tokens: 50000

  optimizer:
    name: "adamw"
    learning_rate: 2.0e-5
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.1

  scheduler:
    name: "cosine"
    warmup_steps: 10
    min_lr: 2.0e-6

  gradient_clipping:
    enabled: true
    max_norm: 1.0

  checkpointing:
    resume_from: "outputs/llm_200m_mid_training_superbpe_debug/checkpoints/latest.pt"
    save_dir: "outputs/llm_200m_sft_superbpe_debug/checkpoints"
    save_every_steps: 10
    keep_last_n: 2

evaluation:
  enabled: true
  eval_every_steps: 5
  eval_steps: 2

logging:
  log_every_steps: 1

plots:
  enabled: true
  output_dir: "outputs/llm_200m_sft_superbpe_debug/plots"
  keep_existing_plots: true
